name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Create placeholder assets
        run: |
          mkdir -p assets
          python3 -c "
          import struct, zlib
          def make_png(w, h, filename):
              raw = b''.join(b'\x00' + b'\xff' * (w * 3) for _ in range(h))
              def chunk(name, data):
                  c = name + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
              with open(filename, 'wb') as f:
                  f.write(b'\x89PNG\r\n\x1a\n')
                  f.write(chunk(b'IHDR', ihdr))
                  f.write(chunk(b'IDAT', zlib.compress(raw)))
                  f.write(chunk(b'IEND', b''))
          make_png(1024, 1024, 'assets/icon.png')
          make_png(1284, 2778, 'assets/splash.png')
          print('Assets created')
          "

      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build unsigned IPA
        run: |
          xcodebuild archive \
            -workspace ios/finance.xcworkspace \
            -scheme finance \
            -configuration Release \
            -archivePath $PWD/build/finance.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -allowProvisioningUpdates NO \
            | xcpretty || true

          mkdir -p build/Payload
          cp -r "$PWD/build/finance.xcarchive/Products/Applications/finance.app" build/Payload/
          cd build && zip -r finance.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: finance-ipa
          path: build/finance.ipa
          retention-days: 30
